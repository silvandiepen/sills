name: Docs

on:
  pull_request:
    paths:
      - 'web/docs/**'
      - 'web/girk.config.json'
      - 'package.json'
      - 'tooling/validate.mjs'
      - 'tooling/build-website.mjs'
      - '.github/workflows/docs.yml'
  push:
    branches: [main]
    paths:
      - 'web/docs/**'
      - 'web/girk.config.json'
      - 'package.json'
      - 'tooling/build-website.mjs'
      - '.github/workflows/docs.yml'

permissions:
  contents: read

concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
      - run: npm ci
      - run: npm run validate:docs
      - run: npm run build:docs
      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push'
        run: npx wrangler@4.111.0 pages deploy web/public --project-name sills --branch main
        env:
          CLOUDFLARE_ACCOUNT_ID: 8cef251b5fdcf6c6f63db98b7aa49f9a
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
